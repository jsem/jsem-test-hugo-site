# Gallery photos, shown in two groups (each renders as its own labelled row on the page).
#
# To add a photo: drop the file into static/images/gallery/ then add an item under the right group.
#   image:   path under static/           (required)
#   caption: short line under the photo, also used as the alt text for screen readers (required)
#   w / h:   the photo's pixel width/height (optional). Only used to reserve the right space so the
#            grid doesn't jump around while photos load. Omit them and it still works, just reflows
#            a little. If you swap a photo, update these to match (or just delete them).
#
# everyday-labradoodle.jpg was cropped from _originals/gallery/regular/image000000.jpeg to remove
# the old Jim's Dog Wash franchise branding on the van door (they've since rebranded).
#
# Full-size originals of everything live in _originals/gallery/ (that folder is NOT published).

heading: "Gallery"
intro: "A little look at some of our happy, freshly-groomed friends."

groups:
  - name: "Everyday grooms"
    intro: "Baths, tidy-ups and full grooms for the family dog."
    items:
      # Order is interleaved (tall / short / wide) so the masonry columns balance instead of
      # stacking all the tall before/after shots into one long column.
      - image: "/images/gallery/everyday-pom.jpg"
        caption: "Tidy trim and clean-up"
        w: 313
        h: 564
      - image: "/images/gallery/everyday-labradoodle.jpg"
        caption: "Looking sharp after a full groom"
        w: 712
        h: 599
      - image: "/images/gallery/everyday-maltese.jpg"
        caption: "Freshly groomed and fluffy"
        w: 562
        h: 296
      - image: "/images/gallery/everyday-beforeafter-cavalier.jpg"
        caption: "Before & after full groom"
        w: 224
        h: 398
      - image: "/images/gallery/everyday-beforeafter-1.jpg"
        caption: "Before & after full groom"
        w: 398
        h: 398
      - image: "/images/gallery/everyday-beforeafter-2.jpg"
        caption: "Before & after: a matted coat made comfortable again"
