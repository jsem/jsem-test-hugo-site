# Pearcedale Prancing Paws site configuration.
# Business facts live here under [params]. Change them in one place and they
# update everywhere on the site (header, footer, contact, SEO, schema).

baseURL   = 'https://pearcedaleprancingpaws.com.au/'  # change to the real domain when live
locale    = 'en-au'
title     = 'Pearcedale Prancing Paws Mobile Dog Grooming'
enableRobotsTXT = true
# One-page site with no blog — don't generate empty /tags/ and /categories/
# list pages. Keeps thin pages out of the sitemap and off Google's radar.
disableKinds = ['taxonomy', 'term']

[params]
  tagline      = 'Happy dog, happy life.'
  description  = 'Pearcedale Prancing Paws: relaxed, caring mobile dog grooming that comes to you across Pearcedale and within 25 km. Family run, 30 years experience, fully insured.'
  shortName    = 'Prancing Paws'

  # Contact details, used by the header call button, contact section, footer and schema
  phone        = '0411 016 237'
  phoneLink    = '+61411016237'          # tel: link (E.164 format)
  email        = 'Lizamcpherson53@gmail.com'

  # Service area and hours
  serviceArea  = 'Pearcedale & surrounds (within 25 km)'
  hours        = 'Monday to Saturday, 8am to 2pm'
  established   = '30 years'

  # Geo (Pearcedale, VIC), used for LocalBusiness schema
  latitude     = '-38.2042'
  longitude    = '145.2289'
  suburb       = 'Pearcedale'
  state        = 'VIC'
  country      = 'Australia'

  # Optional social / profile links (leave blank to hide). Full URLs.
  # When filled in, these also feed the "sameAs" field in the LocalBusiness structured data.
  facebook       = ''
  instagram      = ''
  googleBusiness = 'https://maps.app.goo.gl/Zao2nyTHNsFcuvEC7'   # Google Business Profile — feeds schema "sameAs"

  # Direct Google "leave a review" link. Powers the review button in the reviews section.
  googleReview   = 'https://g.page/r/CaABWYXR08RNEAI/review'

# Top navigation (single-page anchor links). Labels are kept short on purpose so the
# bar never wraps; the full wording still appears on each section heading.
[[menus.main]]
  name = 'Services'
  url  = '#services'
  weight = 1
[[menus.main]]
  name = 'Areas'
  url  = '#areas'
  weight = 2
[[menus.main]]
  name = 'Hours'
  url  = '#hours'
  weight = 3
[[menus.main]]
  name = 'About'
  url  = '#about'
  weight = 4
[[menus.main]]
  name = 'Gallery'
  url  = '#gallery'
  weight = 5
[[menus.main]]
  name = 'Reviews'
  url  = '#reviews'
  weight = 6
[[menus.main]]
  name = 'Contact'
  url  = '#contact'
  weight = 7

[minify]
  minifyOutput = true

[markup.goldmark.renderer]
  unsafe = true   # allow inline HTML in markdown content when needed

[build]
  writeStats = false
