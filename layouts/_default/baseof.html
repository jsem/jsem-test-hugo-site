<!DOCTYPE html>
<html lang="en-au">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    {{ partial "header.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ with resources.Get "js/nav.js" | minify | fingerprint }}
      <script src="{{ .RelPermalink }}" defer></script>
    {{ end }}
  </body>
</html>
