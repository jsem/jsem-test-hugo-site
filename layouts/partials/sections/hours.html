<section class="section section-hours" id="hours">
  <div class="container">
    <div class="hours-card">
      <span class="hours-icon">{{ partial "icon.html" (dict "name" "clock" "class" "icon icon-lg") }}</span>
      <div class="hours-body">
        <p class="eyebrow">Business hours</p>
        <p class="hours-value">{{ site.Params.hours }}</p>
        <p class="hours-note">Appointments by arrangement. Call {{ partial "icon.html" (dict "name" "phone" "class" "icon icon-sm") }} <a href="tel:{{ site.Params.phoneLink }}">{{ site.Params.phone }}</a> to book a time that suits you.</p>
      </div>
    </div>
  </div>
</section>
