{{- $about := .Params.about -}}
<section class="section section-alt" id="about">
  <div class="container">
    <div class="about-inner">
      <p class="eyebrow">{{ partial "icon.html" (dict "name" "paw" "class" "icon icon-sm") }} About us</p>
      <h2 class="section-title">{{ $about.heading }}</h2>
      <p class="about-body">{{ $about.body }}</p>
      <ul class="about-stats">
        <li><strong>30 years</strong><span>of experience</span></li>
        <li><strong>Award-winning</strong><span>show dogs</span></li>
        <li><strong>Family run</strong><span>&amp; fully insured</span></li>
      </ul>
    </div>
  </div>
</section>
